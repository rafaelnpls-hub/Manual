<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width,initial-scale=1" name="viewport" />
  <title>Manual - Carrefour</title>
  <style>
    /* same as v4 */
    :root {
      --bg: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --card: #f9fafb;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --shadow: rgba(0, 0, 0, .06);
    }

    :root.dark {
      --bg: #0b1220;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --card: #111a2b;
      --border: #1f2a44;
      --accent: #60a5fa;
      --accent2: #93c5fd;
      --shadow: rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    a {
      color: var(--accent);
      text-decoration: none
    }

    a:hover {
      text-decoration: underline
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, var(--bg), rgba(0, 0, 0, 0));
      backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand h1 {
      font-size: 18px;
      margin: 0
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end
    }

    .search {
      position: relative;
      min-width: 280px;
      flex: 1
    }

    .search input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--fg);
      outline: none
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      fill: var(--muted)
    }

    .btn {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .btn:hover {
      border-color: var(--accent)
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px
    }

    @media (max-width:980px) {
      main {
        grid-template-columns: 1fr
      }

      .sidebar {
        position: relative;
        top: auto
      }
    }

    .sidebar {
      position: sticky;
      top: 72px;
      align-self: start;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 8px 20px var(--shadow);
    }

    .sidebar .inner {
      padding: 14px
    }

    .sidebar h2 {
      font-size: 14px;
      margin: 0 0 10px 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .details {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: transparent
    }

    .details+.details {
      margin-top: 10px
    }

    details summary {
      cursor: pointer;
      list-style: none;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    details summary::-webkit-details-marker {
      display: none
    }

    summary .title {
      font-weight: 800
    }

    .submenu {
      padding: 0 8px 10px 8px
    }

    .submenu a {
      display: block;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      color: var(--fg)
    }

    .submenu a:hover {
      background: rgba(37, 99, 235, .08);
      border-color: rgba(37, 99, 235, .18)
    }

    .submenu a.l2 {
      font-weight: 600
    }

    .submenu a.l3 {
      margin-left: 12px;
      font-size: 13px;
      color: var(--muted)
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 8px 20px var(--shadow);
      overflow: hidden
    }

    .section header {
      position: relative;
      top: auto;
      border-bottom: 1px solid var(--border);
      background: var(--card)
    }

    .section .head {
      padding: 14px 16px
    }

    .section .head h2 {
      margin: 0;
      font-size: 18px
    }

    .content {
      padding: 16px 16px 22px 16px
    }

    .content h3,
    .content h4 {
      margin: 20px 0 8px 0
    }

    .content h3 {
      font-size: 16px;
      color: var(--accent2)
    }

    .content h4 {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .content p {
      line-height: 1.55;
      margin: 10px 0;
      color: var(--fg)
    }

    .content img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin: 10px 0
    }

    .video-slot {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 14px;
      margin: 14px 0;
      background: rgba(0, 0, 0, 0.02)
    }

    :root.dark .video-slot {
      background: rgba(255, 255, 255, 0.03)
    }

    .video-slot strong {
      display: block;
      font-size: 14px;
      margin-bottom: 6px
    }

    .video-slot .hint {
      font-size: 12px;
      color: var(--muted);
      margin: 0
    }

    mark {
      background: rgba(37, 99, 235, .18);
      color: inherit;
      border-radius: 6px;
      padding: 0 3px
    }

    .hidden {
      display: none !important
    }

    .footer {
      padding: 14px 18px;
      color: var(--muted);
      text-align: center;
      font-size: 12px
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
    }

    .download-link:hover {
      border-color: var(--accent);
      text-decoration: none;
    }

    .dl-icon {
      width: 18px;
      height: 18px;
      fill: currentColor
    }
  </style>
</head>

  <script>(function () {
      const root = document.documentElement;
      const toggleBtn = document.getElementById('themeToggle');
      const searchInput = document.getElementById('search');
      const clearBtn = document.getElementById('clearSearch');

      function setTheme(mode) {
        if (mode === 'dark') root.classList.add('dark'); else root.classList.remove('dark');
        localStorage.setItem('manual_theme', mode);
        toggleBtn.setAttribute('aria-pressed', mode === 'dark');
        toggleBtn.querySelector('span').textContent = mode === 'dark' ? 'Tema: Escuro' : 'Tema: Claro';
      }
      const saved = localStorage.getItem('manual_theme');
      if (saved) setTheme(saved);
      else setTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      toggleBtn.addEventListener('click', () => setTheme(root.classList.contains('dark') ? 'light' : 'dark'));

      const sections = Array.from(document.querySelectorAll('.section'));
      const details = Array.from(document.querySelectorAll('details.details'));

      function showSection(sectionId, anchorId) {
        sections.forEach(sec => sec.classList.toggle('hidden', sec.id !== sectionId));
        details.forEach(d => d.open = (d.getAttribute('data-section') === sectionId));
        if (anchorId) {
          setTimeout(() => { const el = document.getElementById(anchorId); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 0);
        } else {
          window.scrollTo({ top: 0, behavior: 'instant' });
        }
      }
      function parseHash() {
        const h = (location.hash || '').replace('#', '');
        if (!h) return null;
        const sec = document.getElementById(h);
        if (sec && sec.classList.contains('section')) return { section: h, anchor: null };
        const el = document.getElementById(h);
        if (el) { const parent = el.closest('.section'); if (parent) return { section: parent.id, anchor: h }; }
        return null;
      }
      function initNav() {
        const info = parseHash();
        const first = sections[0]?.id;
        if (info) showSection(info.section, info.anchor);
        else if (first) showSection(first, null);
      }
      window.addEventListener('hashchange', initNav);
      initNav();

      function stripMarks(container) {
        container.querySelectorAll('mark').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
      }
      function highlight(container, q) {
        stripMarks(container);
        if (!q) return;
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
        const nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(node => {
          const val = node.nodeValue; const low = val.toLowerCase(); const idx = low.indexOf(q);
          if (idx > -1) {
            const before = document.createTextNode(val.slice(0, idx));
            const mark = document.createElement('mark'); mark.textContent = val.slice(idx, idx + q.length);
            const after = document.createTextNode(val.slice(idx + q.length));
            const parent = node.parentNode;
            parent.insertBefore(before, node); parent.insertBefore(mark, node); parent.insertBefore(after, node); parent.removeChild(node);
          }
        });
      }

      function searchAll() {
        const q = searchInput.value.trim().toLowerCase();
        sections.forEach(sec => {
          const searchable = Array.from(sec.querySelectorAll('[data-searchable="1"]'));
          searchable.forEach(el => el.classList.remove('hidden'));
          stripMarks(sec);
        });
        if (!q) return;

        let firstHit = null;
        sections.forEach(sec => {
          const searchable = Array.from(sec.querySelectorAll('[data-searchable="1"]'));
          searchable.forEach(el => {
            const hit = el.textContent.toLowerCase().includes(q);
            el.classList.toggle('hidden', !hit);
            if (hit) {
              highlight(el, q);
              if (!firstHit) { firstHit = { sectionId: sec.id, anchorId: el.id || null }; }
            }
          });
        });

        if (firstHit) showSection(firstHit.sectionId, firstHit.anchorId);
      }

      let t = null;
      searchInput.addEventListener('input', () => { clearTimeout(t); t = setTimeout(searchAll, 150); });
      clearBtn.addEventListener('click', () => { searchInput.value = ''; searchAll(); searchInput.focus(); });
    })();</script>
</body>
